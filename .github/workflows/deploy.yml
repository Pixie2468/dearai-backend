name: Deploy to GCP

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # CRITICAL: Required for Google Cloud Workload Identity Federation

env:
  REGION: us-central1
  GAR_REPO: dearai-repo
  # The full image path will be built dynamically using the GCP_PROJECT_ID secret

jobs:
  # 1. Lint & test the Go gateway
  test-gateway:
    name: Gateway — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Run tests
        run: go test ./... -race -count=1

  # 2. Lint the Python AI service
  lint-ai-service:
    name: AI Service — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_service
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.14"

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # 3. Build & push gateway image to GAR
  build-gateway:
    name: Gateway — Build & Push
    runs-on: ubuntu-latest
    needs: [test-gateway]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/gateway
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Build & push AI service image to GAR
  build-ai-service:
    name: AI Service — Build & Push
    runs-on: ubuntu-latest
    needs: [lint-ai-service]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/ai-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./ai_service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 5. Deploy to Google Cloud Run
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-gateway, build-ai-service]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Deploy Python AI Service FIRST to generate its URL
      - name: Deploy AI Service
        id: deploy-ai
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: dear-ai-service
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/ai-service:latest
          env_vars: |
            ENV=production
            FALKORDB_HOST=${{ secrets.PROD_FALKORDB_HOST }}
            FALKORDB_PORT=6379
            VERTEX_MODEL_ID=${{ secrets.VERTEX_MODEL_ID }}
            VERTEX_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            VERTEX_LOCATION=${{ env.REGION }}
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            EMBEDDING_MODEL=text-embedding-004
          secrets: |
            PASETO_SYMMETRIC_KEY=PROD_PASETO_KEY:latest
            FALKORDB_PASSWORD=PROD_FALKORDB_PASSWORD:latest

      # Deploy Go Gateway, injecting the AI Service URL
      - name: Deploy Go Gateway
        id: deploy-gateway
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: dear-ai-gateway
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/gateway:latest
          env_vars: |
            ENV=production
            BACKEND_WS=${{ steps.deploy-ai.outputs.url }}
            OIDC_ISSUER=https://securetoken.google.com/${{ secrets.GCP_PROJECT_ID }}
            OIDC_CLIENT_ID=${{ secrets.GCP_PROJECT_ID }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          secrets: |
            PASETO_SYMMETRIC_KEY=PROD_PASETO_KEY:latest