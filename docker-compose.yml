services:
  # ────────────────────────────────────────────────
  # Application Services
  # ────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: dear-ai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    depends_on:
      ai_service:
        condition: service_healthy
    networks:
      - dear-ai-internal

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: dear-ai-ai-service
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./ai_service/.env
    # 1. Mount your local host's ADC file into the container securely (read-only)
    volumes:
      - /home/darsh/.config/gcloud/application_default_credentials.json:/tmp/keys/adc.json:ro,z
    # 2. Tell the Google Cloud SDK exactly where to find it inside the container
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/adc.json
      - HF_HOME=/tmp/huggingface
      - XDG_CACHE_HOME=/tmp
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dear-ai-internal

  # ────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    container_name: dear-ai-falkordb
    restart: unless-stopped
    # Exposed to host for local inspection / development tooling only.
    # Remove in production deployments.
    ports:
      - "6379:6379"
    volumes:
      - falkor_dearai:/data
    command: >
      falkordb-server
      --save 60 1
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dear-ai-internal

networks:
  dear-ai-internal:
    driver: bridge

volumes:
  falkor_dearai:
