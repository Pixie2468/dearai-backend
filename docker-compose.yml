services:
  # ────────────────────────────────────────────────
  # Application Services
  # ────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: dear-ai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./gateway/.env
    depends_on:
      ai_service:
        condition: service_healthy
    networks:
      - dear-ai-internal

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: dear-ai-ai-service
    restart: unless-stopped
    # Not exposed to the host — only reachable through the gateway
    expose:
      - "8000"
    env_file:
      - ./ai_service/.env
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dear-ai-internal

  # ────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    container_name: dear-ai-falkordb
    restart: unless-stopped
    # Exposed to host for local inspection / development tooling only.
    # Remove in production deployments.
    ports:
      - "6379:6379"
    volumes:
      - falkor_dearai:/data
    command: >
      falkordb-server
      --save 60 1
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dear-ai-internal

networks:
  dear-ai-internal:
    driver: bridge

volumes:
  falkor_dearai:
